<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>化学知识助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,system-ui,sans-serif;background:#0f172a;color:#e2e8f0;height:100dvh;display:flex;flex-direction:column;}
header{background:#1e293b;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #334155;}
header h1{font-size:18px;}
header button{background:#3b82f6;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:14px;}
#chat{flex:1;overflow-y:auto;padding:12px;}
.msg{margin-bottom:12px;max-width:90%;}
.msg.user{margin-left:auto;text-align:right;}
.msg.user .bubble{background:#2563eb;display:inline-block;}
.msg.ai .bubble{background:#1e293b;border:1px solid #334155;display:inline-block;}
.bubble{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;word-break:break-word;text-align:left;}
.bubble p{margin:4px 0;}
.bubble h3,.bubble h4{margin:8px 0 4px;}
.bubble table{width:100%;border-collapse:collapse;margin:6px 0;font-size:12px;}
.bubble td,.bubble th{border:1px solid #475569;padding:4px 8px;}
.bubble code,.bubble pre{background:#0f172a;padding:2px 6px;border-radius:4px;font-size:13px;}
#input-area{background:#1e293b;padding:10px;display:flex;gap:8px;border-top:1px solid #334155;}
#input-area input{flex:1;background:#0f172a;color:#e2e8f0;border:1px solid #475569;border-radius:8px;padding:10px;font-size:15px;}
#input-area button{background:#3b82f6;color:#fff;border:none;padding:10px 16px;border-radius:8px;font-size:14px;}
#settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:10;justify-content:center;align-items:center;}
#settings-overlay.show{display:flex;}
#settings{background:#1e293b;padding:20px;border-radius:12px;width:90%;max-width:400px;}
#settings label{display:block;font-size:13px;margin:10px 0 4px;color:#94a3b8;}
#settings input,#settings textarea{width:100%;background:#0f172a;color:#e2e8f0;border:1px solid#475569;border-radius:6px;padding:8px;font-size:14px;}
#settings textarea{height:80px;resize:vertical;}
#settings button{margin-top:12px;width:100%;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:20;opacity:0;transition:opacity 0.3s;}
#toast.show{opacity:1;}
#picker-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:15;justify-content:center;align-items:center;}
#picker-overlay.show{display:flex;}
#picker{background:#1e293b;padding:16px;border-radius:12px;width:92%;max-width:420px;max-height:80dvh;display:flex;flex-direction:column;}
#picker h3{font-size:15px;margin-bottom:8px;}
#picker input{width:100%;background:#0f172a;color:#e2e8f0;border:1px solid #475569;border-radius:6px;padding:8px;font-size:13px;margin-bottom:8px;}
#picker-list{flex:1;overflow-y:auto;max-height:50dvh;}
#picker-list div{padding:10px 8px;border-bottom:1px solid #1e293b;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
#picker-list div:hover,#picker-list div.sel{background:#2563eb;border-radius:4px;}
#picker-list div span.badge{font-size:10px;background:#475569;padding:2px 6px;border-radius:3px;flex-shrink:0;margin-left:6px;}
#picker-actions{display:flex;gap:8px;margin-top:8px;}
#picker-actions button{flex:1;padding:8px;border-radius:6px;font-size:13px;border:none;}
.kb-badge{display:inline-block;background:#166534;color:#86efac;font-size:10px;padding:2px 6px;border-radius:4px;margin:2px;}
.loading{color:#94a3b8;font-size:13px;font-style:italic;}
</style>
</head>
<body>

<header>
  <h1>&#x2697; 化学知识助手</h1>
  <div style="display:flex;gap:6px;">
    <button onclick="clearHistory()" style="background:#475569;font-size:11px;">清记录</button>
    <button onclick="toggleSettings()">&#x2699; 设置</button>
  </div>
</header>

<div id="chat">
  <div class="msg ai"><div class="bubble">
    你好！我是化学教学助手。<br><br>
    知识库：初高中全学段 40 个知识点文件。<br>
    请先在<span style="color:#fbbf24">设置</span>中填入 DeepSeek API Key 和 GitHub 仓库信息。
  </div></div>
</div>

<div id="input-area">
  <input id="prompt" placeholder="输入化学问题..." onkeydown="if(event.key==='Enter')send()">
  <button onclick="send()">发送</button>
</div>

<div id="settings-overlay">
<div id="settings">
  <h3 style="margin-bottom:12px;">&#x2699; 设置</h3>
  <label>DeepSeek API Key</label><input id="ds-key" placeholder="sk-...">
  <label>DeepSeek 模型</label><input id="ds-model" value="deepseek-v4-pro" placeholder="deepseek-v4-pro">
  <label>Gitee 用户名</label><input id="gh-user" value="www107928812">
  <label>Gitee 仓库名</label><input id="gh-repo" value="chemistry-kb">
  <label>Gitee Token</label><input id="gh-token" value="14a3b5c8625b149535773c149a779f21" type="password">
  <label>System Prompt <span style="color:#94a3b8;font-size:11px">(可自定义)</span></label>
  <textarea id="sys-prompt">你是一名化学教培老师，名为"化学助手"。回答规则：

**1. 知识优先级**：先查下方知识库 → 没有就用自己的化学知识 → 都不确定就直说"这个我不确定，建议查阅教材"。

**2. 风格要求**：
- 简洁直接，不要废话，不要开场白和结尾总结
- 概念用**加粗**标记，方便扫读
- 能用表格对比就用表格（如 |A|B|C|）
- 复杂计算分步骤，每步一行
- 化学方程式用 $$ 格式

**3. 分层**：初中用生活例子，高中可引入微观机理和公式推导

**4. 教学附加**：
- 标注常见学生误区（❌）
- 给出口诀/记忆方法
- 高频考点用 ★ 标注

**5. 归档**：回答中提供了知识库没有的新知识点时，在末尾加上：
`[建议归档: chemistry/高中化学/选必X/第X章-XXX.md]`
后面跟一段可直接保存的 Markdown 内容。根据知识点所属学段和章节准确判断路径。初中学段路径用 `chemistry/初中化学/九年级上册/` 或 `九年级下册/`，高中学段用 `chemistry/高中化学/必修一/`、`必修二/`、`选必1-化学反应原理/`、`选必2-物质结构与性质/`、`选必3-有机化学基础/`。</textarea>
  <div style="display:flex;gap:8px;">
    <button onclick="saveSettings()" style="flex:1;">保存</button>
    <button onclick="toggleSettings()" style="flex:1;background:#475569;">取消</button>
  </div>
  <div style="margin-top:10px;font-size:11px;color:#94a3b8;">
    数据仅存储在浏览器 localStorage，不会上传到任何服务器。<br>
    <span style="font-size:10px;color:#64748b;">版本: 20260611-fix1 · 自动禁用缓存</span>
  </div>
</div>
</div>

<div id="picker-overlay">
<div id="picker">
  <h3>选择归档章节</h3>
  <input id="picker-search" placeholder="搜索文件名..." oninput="filterPicker()">
  <div id="picker-list"></div>
  <div id="picker-actions">
    <button onclick="closePicker()" style="background:#475569;">取消</button>
    <button id="picker-confirm" onclick="confirmPicker()" style="background:#3b82f6;" disabled>确定</button>
  </div>
</div>
</div>

<div id="toast"></div>

<script>
// ── 状态 ──
let messages = [{role:'system',content:''}];

// ── 聊天记录持久化 ──
function saveHistory(){
  const slim=messages.slice(1).map(m=>({role:m.role,content:m.content}));
  localStorage.setItem('chem_history',JSON.stringify(slim));
}
function loadHistory(){
  try{
    const raw=localStorage.getItem('chem_history');
    if(raw){
      const hist=JSON.parse(raw);
      hist.forEach(m=>{messages.push(m);addMsg(m.role,m.content);});
    }
  }catch(e){}
}
function clearHistory(){
  if(confirm('确定清除所有聊天记录？')){
    localStorage.removeItem('chem_history');
    messages=[{role:'system',content:localStorage.getItem('chem_sys-prompt')||''}];
    document.getElementById('chat').innerHTML='';
    toast('聊天记录已清除');
  }
}

// ── 设置 ──
function loadSettings(){
  ['ds-key','ds-model','gh-user','gh-repo','gh-token','sys-prompt'].forEach(id=>{
    const v=localStorage.getItem('chem_'+id);
    if(v) document.getElementById(id).value=v;
  });
  if(!localStorage.getItem('chem_ds-model')) document.getElementById('ds-model').value='deepseek-chat';
  const sp=localStorage.getItem('chem_sys-prompt');
  if(sp) messages[0].content=sp;
}
function saveSettings(){
  ['ds-key','ds-model','gh-user','gh-repo','gh-token','sys-prompt'].forEach(id=>{
    localStorage.setItem('chem_'+id, document.getElementById(id).value);
  });
  messages[0].content=document.getElementById('sys-prompt').value;
  toggleSettings();
  toast('设置已保存');
}
function toggleSettings(){
  document.getElementById('settings-overlay').classList.toggle('show');
}

// ── Toast ──
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

// ── 加载知识库（Gitee优先，带本地缓存） ──
async function loadKB(){
  const gUser=localStorage.getItem('chem_gh-user');
  const gRepo=localStorage.getItem('chem_gh-repo');
  const gToken=localStorage.getItem('chem_gh-token');
  if(!gUser||!gRepo) return loadFromLocalCache();

  // 1. 先尝试从 Gitee 拉取
  try{
    const treeUrl=`https://gitee.com/api/v5/repos/${gUser}/${gRepo}/git/trees/master?recursive=1&access_token=${gToken}`;
    const res=await fetch(treeUrl);
    if(res.ok){
      const data=await res.json();
      const mdFiles=data.tree.filter(f=>f.path.endsWith('.md')&&(f.path.startsWith('chemistry/')||f.path==='CLAUDE.md'));

      let kbText='';
      const maxFetch=Math.min(mdFiles.length,12);
      const fetchBatch=mdFiles.slice(0,maxFetch);

      const contents=await Promise.all(fetchBatch.map(async f=>{
        const curl=`https://gitee.com/${gUser}/${gRepo}/raw/master/${f.path}`;
        const r=await fetch(curl);
        return r.ok?r.text():'';
      }));

      kbText=contents.join('\n\n');
      localStorage.setItem('chem_kb_cache',kbText);
      localStorage.setItem('chem_kb_time',Date.now().toString());
      return {text:kbText, files:mdFiles.map(f=>f.path), source:'Gitee'};
    }
  }catch(e){}

  // 2. Gitee 不可用，读取本地缓存
  return loadFromLocalCache();
}

function loadFromLocalCache(){
  const cache=localStorage.getItem('chem_kb_cache');
  const time=localStorage.getItem('chem_kb_time');
  if(cache){
    return {text:cache, files:[], source:'本地缓存 ('+(time?new Date(parseInt(time)).toLocaleDateString():'未知')+')'};
  }
  return null;
}

// ── 构建消息 ──
async function buildMessages(userMsg){
  const base=[{role:'system',content:localStorage.getItem('chem_sys-prompt')||messages[0].content}];

  // 尝试加载知识库
  const kb=await loadKB();
  if(kb&&kb.text){
    base[0].content+='\n\n【知识库内容参考（来源：'+kb.source+'）】\n'+kb.text.substring(0,10000);
  }

  // 添加历史（最近10条）
  const recent=messages.slice(1).slice(-10);
  base.push(...recent);
  base.push({role:'user',content:userMsg});
  return base;
}

// ── 发送消息 ──
async function send(){
  const input=document.getElementById('prompt');
  const msg=input.value.trim();
  if(!msg) return;

  const apiKey=localStorage.getItem('chem_ds-key');
  if(!apiKey){toast('请先设置 API Key');toggleSettings();return;}

  input.value='';
  addMsg('user',msg);
  messages.push({role:'user',content:msg});
  saveHistory();

  const loading=addMsg('ai','<span class="loading">思考中...</span>');

  try{
    const apiMessages=await buildMessages(msg);
    const dsModel=localStorage.getItem('chem_ds-model')||'deepseek-chat';

    const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({model:dsModel,messages:apiMessages,max_tokens:2048,temperature:0.7})
    });

    if(!resp.ok){
      const err=await resp.text();
      throw new Error(`API 错误 (${resp.status}): ${err}`);
    }

    const data=await resp.json();
    const reply=data.choices[0].message.content;
    messages.push({role:'assistant',content:reply});
    saveHistory();

    // 更新加载消息
    loading.querySelector('.bubble').innerHTML=renderMarkdown(reply);
    messages.push({role:'assistant',content:reply});

    // 添加保存按钮
    const saveBtn=document.createElement('button');
    saveBtn.textContent='保存到知识库';
    saveBtn.style.cssText='margin-top:6px;font-size:11px;background:#166534;color:#86efac;border:none;padding:4px 10px;border-radius:4px;';
    saveBtn.onclick=()=>saveToKB(reply);
    loading.querySelector('.bubble').appendChild(saveBtn);

  }catch(e){
    loading.querySelector('.bubble').innerHTML='<span style="color:#f87171">错误: '+e.message+'</span>';
  }

  scrollDown();
}

// ── 保存到知识库 ──
let _pickerFiles=[]; let _pickerContent=''; let _pickerSelected=null;

async function saveToKB(content){
  const ghUser=localStorage.getItem('chem_gh-user');
  const ghRepo=localStorage.getItem('chem_gh-repo');
  const ghToken=localStorage.getItem('chem_gh-token');
  if(!ghUser||!ghRepo||!ghToken){toast('请先设置 GitHub 信息');return;}

  _pickerContent=content;

  // 自动提取 [建议归档: 路径]
  const match=content.match(/\[建议归档:\s*([^\]]+)\]/);
  _pickerSelected=match?match[1].trim():null;

  // 本地文件列表（无需网络）
  const KB_FILES=[
    'chemistry/初中化学/九年级上册/第一单元-走进化学世界.md','chemistry/初中化学/九年级上册/第二单元-空气和氧气.md','chemistry/初中化学/九年级上册/第三单元-物质构成的奥秘.md','chemistry/初中化学/九年级上册/第四单元-自然界的水.md','chemistry/初中化学/九年级上册/第五单元-化学反应的定量关系.md','chemistry/初中化学/九年级上册/第六单元-碳和碳的氧化物.md','chemistry/初中化学/九年级上册/第七单元-能源的合理利用与开发.md',
    'chemistry/初中化学/九年级下册/第八单元-金属和金属材料.md','chemistry/初中化学/九年级下册/第九单元-溶液.md','chemistry/初中化学/九年级下册/第十单元-常见的酸碱盐.md','chemistry/初中化学/九年级下册/第十一单元-化学与社会.md',
    'chemistry/高中化学/必修一/第一章-物质及其变化.md','chemistry/高中化学/必修一/第二章-海水中的重要元素-钠和氯.md','chemistry/高中化学/必修一/第三章-铁-金属材料.md','chemistry/高中化学/必修一/第四章-物质结构-元素周期律.md',
    'chemistry/高中化学/必修二/第五章-化工生产中的重要非金属元素.md','chemistry/高中化学/必修二/第六章-化学反应与能量.md','chemistry/高中化学/必修二/第七章-有机化合物.md','chemistry/高中化学/必修二/第八章-化学与可持续发展.md',
    'chemistry/高中化学/选必1-化学反应原理/第一章-化学反应的热效应.md','chemistry/高中化学/选必1-化学反应原理/第二章-化学反应速率与化学平衡.md','chemistry/高中化学/选必1-化学反应原理/第三章-水溶液中的离子反应与平衡.md','chemistry/高中化学/选必1-化学反应原理/第四章-化学反应与电能.md',
    'chemistry/高中化学/选必2-物质结构与性质/第一章-原子结构与性质.md','chemistry/高中化学/选必2-物质结构与性质/第二章-分子结构与性质.md','chemistry/高中化学/选必2-物质结构与性质/第三章-晶体结构与性质.md',
    'chemistry/高中化学/选必3-有机化学基础/第一章-有机化合物的结构特点与研究方法.md','chemistry/高中化学/选必3-有机化学基础/第二章-烃.md','chemistry/高中化学/选必3-有机化学基础/第三章-烃的衍生物.md','chemistry/高中化学/选必3-有机化学基础/第四章-生物大分子.md','chemistry/高中化学/选必3-有机化学基础/第五章-合成高分子.md',
    'chemistry/中考专题/中考高频考点.md','chemistry/中考专题/中考实验探究.md','chemistry/中考专题/中考化学计算.md','chemistry/中考专题/中考真题分类.md',
    'chemistry/高考专题/高考高频考点.md','chemistry/高考专题/高考实验综合.md','chemistry/高考专题/高考化工流程.md','chemistry/高考专题/高考反应原理综合.md','chemistry/高考专题/高考选考策略.md',
  ];
  _pickerFiles=KB_FILES.map(p=>{
    let cat='';
    if(p.includes('初中化学')) cat='初中';
    else if(p.includes('必修')) cat='必修';
    else if(p.includes('选必1')) cat='选必1';
    else if(p.includes('选必2')) cat='选必2';
    else if(p.includes('选必3')) cat='选必3';
    else if(p.includes('高考')) cat='高考';
    else if(p.includes('中考')) cat='中考';
    return {path:p, cat};
  });

  const list=document.getElementById('picker-list');
  document.getElementById('picker-overlay').classList.add('show');
  document.getElementById('picker-search').value='';
  document.getElementById('picker-confirm').disabled=true;
  renderPicker();
}

function renderPicker(filter=''){
  const list=document.getElementById('picker-list');
  list.innerHTML='';
  const filtered=_pickerFiles.filter(f=>!filter||f.path.includes(filter)||f.cat.includes(filter));
  if(!filtered.length){list.innerHTML='<div style="color:#94a3b8;padding:16px;">无匹配结果</div>';return;}

  // 三级分组：学段 → 书名 → 章节
  const tree={};
  filtered.forEach(f=>{
    const p=f.path.replace('chemistry/','');
    const parts=p.split('/');
    let level1,book,chapter;
    if(parts[0]==='初中化学'){
      level1='初中化学';
      book=parts[1]==='九年级上册'?'九年级上册':'九年级下册';
      chapter=parts[2].replace('.md','');
    }else if(parts[0]==='高中化学'){
      level1='高中化学';
      book=parts[1];
      chapter=parts[2].replace('.md','');
    }else if(parts[0]==='中考专题'){
      level1='中考专题';book='';chapter=parts[1].replace('.md','');
    }else if(parts[0]==='高考专题'){
      level1='高考专题';book='';chapter=parts[1].replace('.md','');
    }else{level1='其他';book='';chapter=p;}
    if(!tree[level1]) tree[level1]={};
    if(!tree[level1][book]) tree[level1][book]=[];
    tree[level1][book].push({path:f.path, chapter});
  });

  const L1order=['初中化学','高中化学','中考专题','高考专题','其他'];
  const L2order={'初中化学':['九年级上册','九年级下册'],'高中化学':['必修一','必修二','选必1-化学反应原理','选必2-物质结构与性质','选必3-有机化学基础']};

  L1order.forEach(l1=>{
    if(!tree[l1]) return;
    // 一级：学段标题
    const d1=document.createElement('div');
    d1.style.cssText='padding:10px 8px 4px;font-size:12px;color:#fbbf24;font-weight:bold;border-bottom:1px solid #334155;margin-top:6px;';
    d1.textContent='▸ '+l1;
    list.appendChild(d1);

    const books=Object.keys(tree[l1]);
    const order=L2order[l1]||books;
    order.forEach(bk=>{
      if(!tree[l1][bk]) return;
      // 二级：书名
      const d2=document.createElement('div');
      d2.style.cssText='padding:6px 8px 2px 12px;font-size:11px;color:#94a3b8;font-weight:bold;';
      d2.textContent=bk;
      list.appendChild(d2);

      // 三级：章节文件
      tree[l1][bk].forEach(f=>{
        const div=document.createElement('div');
        div.style.cssText='padding:8px 8px 8px 24px;font-size:13px;cursor:pointer;border-bottom:1px solid #0f172a;';
        if(_pickerSelected&&f.path===_pickerSelected){div.classList.add('sel');div.style.background='#2563eb';div.style.borderRadius='4px';}
        div.innerHTML='<span>📄 '+f.chapter+'</span>';
        div.onclick=()=>{
          list.querySelectorAll('div').forEach(d=>{d.classList.remove('sel');d.style.background='';});
          div.classList.add('sel');div.style.background='#2563eb';div.style.borderRadius='4px';
          _pickerSelected=f.path;
          document.getElementById('picker-confirm').disabled=false;
        };
        list.appendChild(div);
      });
    });
  });
}

function filterPicker(){
  const q=document.getElementById('picker-search').value;
  renderPicker(q);
}

function closePicker(){
  document.getElementById('picker-overlay').classList.remove('show');
}

async function confirmPicker(){
  if(!_pickerSelected) return;
  closePicker();
  const ghUser=localStorage.getItem('chem_gh-user');
  const ghRepo=localStorage.getItem('chem_gh-repo');
  const ghToken=localStorage.getItem('chem_gh-token');
  const archiveContent=_pickerContent.split(/\[建议归档:/)[1]?.replace(/^[^\]]+\]\s*/,'')||_pickerContent;
  await commitToGitee(_pickerSelected, archiveContent, ghUser, ghRepo, ghToken);
}

async function commitToGitee(fname, content, gUser, gRepo, gToken){
  try{
    const now=new Date().toISOString().slice(0,10);
    let nc=content;
    if(!nc.includes('> **归档时间**')) nc+='\n\n> **归档时间**：'+now+' | 移动端补充';

    // UTF-8 safe base64
    function toBase64(str){
      const encoder=new TextEncoder();
      const bytes=encoder.encode(str);
      let bin='';
      bytes.forEach(b=>bin+=String.fromCharCode(b));
      return btoa(bin);
    }

    // Gitee API: 获取文件现有内容
    let sha=null, existingContent='';
    const getUrl='https://gitee.com/api/v5/repos/'+gUser+'/'+gRepo+'/contents/'+fname+'?access_token='+gToken;
    try{
      const getRes=await fetch(getUrl);
      if(getRes.ok){
        const d=await getRes.json();sha=d.sha;
        // 解码现有内容
        if(d.content){
          try{existingContent=atob(d.content.replace(/\s/g,''));}
          catch(e2){existingContent='';}
        }
      }
    }catch(e){}

    // 追加而非覆盖
    const separator='\n\n---\n\n';
    const finalContent=existingContent?existingContent+separator+nc:nc;

    const body={
      access_token:gToken,
      content:toBase64(finalContent),
      message:'移动端补充: '+fname.split('/').pop().replace('.md',''),
      branch:'master'
    };
    if(sha) body.sha=sha;

    // 用 query string 传 access_token（更可靠）
    const apiUrl='https://gitee.com/api/v5/repos/'+gUser+'/'+gRepo+'/contents/'+fname+'?access_token='+gToken;
    const method=sha?'PUT':'POST';

    const putRes=await fetch(apiUrl,{
      method:method,
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams(body).toString()
    });

    if(putRes.ok){toast('已归档到 Gitee!');}
    else{
      const err=await putRes.text();
      toast('保存失败: HTTP '+putRes.status+' '+err.substring(0,80));
    }
  }catch(e){
    // 网络不可用时降级到本地存储
    const queue=JSON.parse(localStorage.getItem('chem_save_queue')||'[]');
    queue.push({fname, content:nc, time:new Date().toISOString()});
    localStorage.setItem('chem_save_queue',JSON.stringify(queue));
    toast('已暂存本地（'+queue.length+'条），电脑打开时自动同步');
  }
}

// ── 简单 Markdown 渲染 ──
function renderMarkdown(text){
  let html=text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h4>$1</h4>')
    .replace(/^## (.+)$/gm,'<h3>$1</h3>')
    .replace(/^# (.+)$/gm,'<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^\- (.+)$/gm,'<li>$1</li>')
    .replace(/^\|(.+)\|$/gm,row=>{
      const cells=row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    })
    .replace(/(<tr>.*<\/tr>\n?)+/g,'<table>$&</table>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>');
  return '<p>'+html+'</p>';
}

function addMsg(role,text){
  const div=document.createElement('div');
  div.className='msg '+role;
  const bubble=document.createElement('div');
  bubble.className='bubble';
  bubble.innerHTML=role==='user'?text:renderMarkdown(text);
  div.appendChild(bubble);
  document.getElementById('chat').appendChild(div);
  return div;
}

function scrollDown(){
  const chat=document.getElementById('chat');
  chat.scrollTop=chat.scrollHeight;
}

// ── 初始化 ──
loadSettings();
loadHistory();
scrollDown();
